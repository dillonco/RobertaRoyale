name: Deploy via Mainline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to deploy (defaults to latest)'
        required: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MAINLINE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host %s\n  ProxyCommand cloudflared access ssh --hostname %%h --service-token-id %s --service-token-secret %s\n  StrictHostKeyChecking no\n  IdentityFile ~/.ssh/deploy_key\n' \
            "${{ secrets.MAINLINE_SSH_HOST }}" \
            "${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            "${{ secrets.CF_ACCESS_CLIENT_SECRET }}" >> ~/.ssh/config

      - name: Deploy
        run: |
          ssh ${{ secrets.MAINLINE_SSH_USER }}@${{ secrets.MAINLINE_SSH_HOST }} \
            "mainline deploy --repo ${{ github.repository }} --commit ${{ github.sha }}"
